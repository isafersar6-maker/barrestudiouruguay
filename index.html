<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barre Studio Uruguay - Book Your Class</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🩰 Barre Studio Uruguay</h1>
    <p class="subtitle">Book Your Class Today</p>
    
    <form id="booking-form">
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label for="phone">Phone Number *</label>
        <input type="tel" id="phone" name="phone" placeholder="+598 9 XXXX XXXX" required>
      </div>
      
      <div class="form-group">
        <label for="class_type">Class Type *</label>
        <select id="class_type" name="class_type" required>
          <option value="">-- Select a class type --</option>
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
          <option value="reformer">Reformer Pilates</option>
          <option value="power">Power Barre</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="date">Preferred Date *</label>
        <input type="date" id="date" name="date" required>
      </div>
      
      <div class="form-group">
        <label for="message">Additional Notes</label>
        <textarea id="message" name="message" placeholder="Any special requests or injuries we should know about?"></textarea>
      </div>
      
      <button type="submit" class="btn">📅 Book Your Class</button>
    </form>
    
    <div id="response" class="response"></div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
